<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión • Instagram</title>
    
    <!-- Aquí va el favicon - descomenta la siguiente línea y reemplaza la URL con la ruta a tu favicon -->
    <!-- <link rel="icon" href="ruta/a/tu/favicon.ico" type="image/x-icon"> -->
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="login-header">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" alt="Instagram" class="logo">
            </div>
            
            <form id="loginForm">
        <div class="input-box">
          <input type="email" id="email" name="email" required placeholder=" ">
          <label for="email">Teléfono, usuario o correo electrónico</label>
        </div>

        <div class="input-box">
          <input type="password" id="password" name="password" required placeholder=" ">
          <label for="password">Contraseña</label>
        </div>

        <button type="submit">Iniciar sesión</button>
      </form>
            
            <div class="divider">
                <span>O</span>
            </div>
            
            <div class="facebook-login">
                <svg class="facebook-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#385185">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                <a href="#">Iniciar sesión con Facebook</a>
            </div>
            
            <div class="forgot-password">
                <a href="#">¿Olvidaste la contraseña?</a>
            </div>
        </div>
        
        <div class="signup-box">
            <p>¿No tienes una cuenta? <a href="#">Regístrate</a></p>
        </div>
        
        <div class="app-download">
            <p>Descarga la aplicación.</p>
            <div class="app-buttons">
                <a href="#" class="app-button app-store"></a>
                <a href="#" class="app-button google-play"></a>
            </div>
        </div>
    </div>
</body>
</html>
